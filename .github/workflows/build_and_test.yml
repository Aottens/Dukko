# Dukko CI — Phase 1 plan 01-03
#
# Gates every push and every PR with the full Phase 1 validator matrix:
#   1. Release build + arm64-architecture verification
#   2. pluginval at strictness level 10 against the VST3
#   3. Steinberg's official VST3 validator (located dynamically under build/_deps)
#   4. clap-validator 0.3.2 against the CLAP
#   5. LICENSES.md staleness guard (every dir in build/_deps must be tracked)
#   6. Workflow artifact upload (Dukko.vst3 + Dukko.clap, 30-day retention)
#
# In parallel: a Debug build with AddressSanitizer (compile-only in Phase 1; Phase 2
# lights it up by adding audio-thread invariants).
#
# Pinned versions — bump deliberately:
#   pluginval        v1.0.4   (https://github.com/Tracktion/pluginval)
#   clap-validator   0.3.2    (https://github.com/free-audio/clap-validator)
#
# Triggers (D-13): every push to any branch + every pull request to any branch.
# Runner: macos-14 (Apple Silicon, native arm64 — D-13 / CLAUDE.md §"CI / Packaging").

name: Build & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

defaults:
  run:
    shell: bash

jobs:

  # ============================================================================
  # Job 1 — build-and-validate
  # Release build + all three validators + arm64 verification + LICENSES.md guard
  # + artifact upload. This is the QUAL-01 / BUILD-04 gate.
  # ============================================================================
  build-and-validate:
    name: Release build + validators
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CPM
          key: ${{ runner.os }}-cpm-${{ hashFiles('**/CMakeLists.txt', '**/cmake/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cpm-

      - name: Configure (Release, arm64)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      # BUILD-02 enforcement: fail fast in CI if the binary is not pure arm64.
      # `grep -w` matches the literal token `arm64` only — `arm64e` (Apple's
      # pointer-authenticated variant) would not satisfy the gate.
      - name: Verify arm64 architecture (VST3)
        run: lipo -archs build/Dukko_artefacts/Release/VST3/Dukko.vst3/Contents/MacOS/Dukko | grep -w arm64

      - name: Verify arm64 architecture (CLAP)
        run: lipo -archs build/Dukko_artefacts/Release/CLAP/Dukko.clap/Contents/MacOS/Dukko | grep -w arm64

      # ---- Validator 1: pluginval (D-10, QUAL-01) -----------------------------
      - name: Download pluginval 1.0.4
        run: |
          curl -L -o pluginval.zip \
            "https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_macOS.zip"
          unzip -q pluginval.zip
          chmod +x pluginval.app/Contents/MacOS/pluginval

      - name: Run pluginval (strictness 10)
        run: |
          mkdir -p pluginval-results
          pluginval.app/Contents/MacOS/pluginval \
            --strictness-level 10 \
            --validate-in-process \
            --output-dir ./pluginval-results \
            "build/Dukko_artefacts/Release/VST3/Dukko.vst3"

      # ---- Validator 2: Steinberg VST3 validator (D-10) -----------------------
      # The validator binary is built as part of JUCE's vendored VST3 SDK fork.
      # Its exact path under build/_deps/ depends on JUCE's CMake layout, which
      # may shift across JUCE 8.x point releases. Resolve dynamically so the
      # workflow is robust to upstream reshuffles. If `find` returns empty,
      # the step exits non-zero loudly rather than silently skipping.
      - name: Run Steinberg VST3 validator
        run: |
          set -e
          VALIDATOR=$(find build/_deps -name validator -type f -perm -u+x | head -1)
          if [ -z "$VALIDATOR" ]; then
            echo "FATAL: Steinberg VST3 validator not found under build/_deps/"
            find build/_deps -name validator -type f
            exit 1
          fi
          echo "Using Steinberg validator at: $VALIDATOR"
          "$VALIDATOR" "build/Dukko_artefacts/Release/VST3/Dukko.vst3"

      # ---- Validator 3: clap-validator (D-10) ---------------------------------
      # Pinned to the standard GitHub release-asset URL pattern for tag 0.3.2.
      # If the asset filename differs from this convention on first push, the
      # curl step fails loudly with HTTP 404 — patch the URL inline as a
      # one-liner per plan 04 fallback.
      - name: Download clap-validator 0.3.2
        run: |
          curl -L -o clap-validator.tar.gz \
            "https://github.com/free-audio/clap-validator/releases/download/0.3.2/clap-validator-0.3.2-macos-arm64.tar.gz"
          tar xf clap-validator.tar.gz
          chmod +x clap-validator

      - name: Run clap-validator
        run: ./clap-validator validate "build/Dukko_artefacts/Release/CLAP/Dukko.clap"

      # ---- LICENSES.md staleness guard (QUAL-05 ongoing protection) -----------
      # Every directory under build/_deps/ must have a row in LICENSES.md.
      # Self-invalidating gate: a future contributor adding a CPM dep without
      # updating LICENSES.md is blocked at CI time with a loud, self-explanatory
      # error. CPM extracts deps as `<name>-src`; strip that suffix before
      # grepping so the LICENSES.md row can use the canonical dep name.
      - name: LICENSES.md staleness guard
        run: |
          set -e
          for dep_dir in build/_deps/*/; do
            dep_name=$(basename "$dep_dir" | sed 's/-src$//')
            # Skip CPM internal subdirs (e.g. *-build, *-subbuild) — only
            # directories ending with -src represent actual dependency sources.
            case "$(basename "$dep_dir")" in
              *-build|*-subbuild) continue ;;
            esac
            if ! grep -qi "$dep_name" LICENSES.md; then
              echo "MISSING in LICENSES.md: $dep_name"
              exit 1
            fi
          done

      # ---- Artifact upload (D-12) ---------------------------------------------
      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v7
        with:
          name: Dukko-VST3
          path: build/Dukko_artefacts/Release/VST3/Dukko.vst3
          retention-days: 30

      - name: Upload CLAP artifact
        uses: actions/upload-artifact@v7
        with:
          name: Dukko-CLAP
          path: build/Dukko_artefacts/Release/CLAP/Dukko.clap
          retention-days: 30

  # ============================================================================
  # Job 2 — build-debug-asan
  # Debug + AddressSanitizer compile-only. No DSP yet in Phase 1, so ASan has
  # nothing audio-related to find — but the toolchain is verified working so
  # Phase 2's audio-thread-safety work lands on a job that already runs (D-11).
  # ============================================================================
  build-debug-asan:
    name: Debug + ASan compile
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/CPM
          key: ${{ runner.os }}-cpm-${{ hashFiles('**/CMakeLists.txt', '**/cmake/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cpm-

      - name: Configure (Debug + ASan, arm64)
        run: |
          cmake -B build-debug \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_MODULE_LINKER_FLAGS="-fsanitize=address"

      - name: Build (Debug + ASan)
        run: cmake --build build-debug --config Debug --parallel
